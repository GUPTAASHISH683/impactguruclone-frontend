<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ══ Primary SEO ══ -->
    <title>FundDoo - Crowdfunding for Medical, Education & Social Causes in India</title>
    <meta name="description" content="FundDoo is India's trusted crowdfunding platform. Raise funds for medical treatment, education, disaster relief & more. Start free in minutes." />
    <meta name="keywords" content="crowdfunding India, medical crowdfunding, fundraising platform, donate online India, FundDoo, medical fundraiser, education fundraiser, charity India, NGO fundraising" />
    <meta name="author" content="FundDoo" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://www.funddoo.com/" />

    <!-- ══ Open Graph / Facebook ══ -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.funddoo.com/" />
    <meta property="og:site_name" content="FundDoo" />
    <meta property="og:title" content="FundDoo - Crowdfunding for Medical & Social Causes in India" />
    <meta property="og:description" content="India's trusted crowdfunding platform. Raise funds for medical emergencies, education and social causes." />
    <meta property="og:image" content="https://www.funddoo.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="FundDoo - Crowdfunding platform for India" />
    <meta property="og:locale" content="en_IN" />

    <!-- ══ Twitter Card ══ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@FundDoo" />
    <meta name="twitter:creator" content="@FundDoo" />
    <meta name="twitter:title" content="FundDoo - Crowdfunding for Medical & Social Causes" />
    <meta name="twitter:description" content="India's most trusted crowdfunding platform. ₹1,200 Cr+ raised, 5L+ campaigns, 20M+ lives impacted." />
    <meta name="twitter:image" content="https://www.funddoo.com/og-image.png" />
    <meta name="twitter:image:alt" content="FundDoo crowdfunding platform" />

    <!-- ══ PWA / App ══ -->
    <meta name="theme-color" content="#1B9B6C" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FundDoo" />
    <meta name="application-name" content="FundDoo" />
    <meta name="msapplication-TileColor" content="#1B9B6C" />

    <!-- ══ Geo targeting ══ -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="rating" content="general" />

    <!-- ══ Icons ══ -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ══ JSON-LD: Organization ══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FundDoo",
      "alternateName": "Fund Doo",
      "url": "https://www.funddoo.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://www.funddoo.com/favicon.svg",
        "width": 192,
        "height": 192
      },
      "description": "India's most trusted crowdfunding platform for medical, education and social causes.",
      "foundingDate": "2014",
      "areaServed": "IN",
      "sameAs": [
        "https://www.facebook.com/FundDoo",
        "https://twitter.com/FundDoo",
        "https://www.instagram.com/funddoo",
        "https://www.linkedin.com/company/funddoo"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": ["English", "Hindi"],
        "areaServed": "IN"
      }
    }
    </script>

    <!-- ══ JSON-LD: WebSite + Sitelinks Search ══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FundDoo",
      "url": "https://www.funddoo.com",
      "description": "India's most trusted crowdfunding platform for medical emergencies, education and social causes.",
      "inLanguage": "en-IN",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.funddoo.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ══ JSON-LD: FAQ ══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How do I start a fundraiser on FundDoo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Starting a fundraiser on FundDoo is free and takes less than 10 minutes. Simply fill in your story, set a fundraising goal, and launch your campaign. Our team will help promote it to millions of donors."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a platform fee for medical crowdfunding?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "FundDoo charges zero platform fee for medical campaigns. You keep more of what you raise to fund your treatment."
          }
        },
        {
          "@type": "Question",
          "name": "How much has FundDoo raised in total?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "FundDoo has raised over ₹1,200 crore through more than 5 lakh campaigns, impacting over 20 million lives across India."
          }
        },
        {
          "@type": "Question",
          "name": "Is donating on FundDoo secure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. FundDoo uses bank-grade 256-bit SSL encryption and partners with trusted payment gateways. All donations are 100% secure."
          }
        }
      ]
    }
    </script>

    <!-- ══ JSON-LD: BreadcrumbList ══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home",        "item": "https://www.funddoo.com/" },
        { "@type": "ListItem", "position": 2, "name": "Campaigns",   "item": "https://www.funddoo.com/campaigns" },
        { "@type": "ListItem", "position": 3, "name": "How It Works","item": "https://www.funddoo.com/how-it-works" }
      ]
    }
    </script>
